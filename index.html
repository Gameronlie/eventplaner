<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Setup</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .btn { background: #238636; color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .link { display: block; margin-top: 20px; color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Event Portal</h1>
    <button id="install" class="btn" style="display:none;">APP INSTALLIEREN</button>
    <a href="event.html" class="link">Direkt zum Planer →</a>

    <script>
        let promptEvt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            promptEvt = e;
            document.getElementById('install').style.display = 'block';
        });
        document.getElementById('install').addEventListener('click', () => {
            if(promptEvt) promptEvt.prompt();
        });
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
