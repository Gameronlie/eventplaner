<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Event Portal</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0b0e14; --blue: #58a6ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; }
        
        /* Das Portal-Gerüst */
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            background: #161b22; 
            padding: 15px; 
            text-align: center; 
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Der Bereich, in dem deine event.html erscheint */
        iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        .refresh-btn {
            background: #1f6feb;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <span style="color: var(--blue); font-weight: bold;">EVENT PORTAL</span>
            <!-- Dieser Button erzwingt das Update der Ansicht -->
            <button class="refresh-btn" onclick="refreshApp()">Update</button>
        </header>

        <!-- Hier wird deine eigene HTML-Seite reingeladen -->
        <iframe src="event.html" id="app-frame"></iframe>
    </div>

    <script>
        function refreshApp() {
            const frame = document.getElementById('app-frame');
            // Trick: Wir hängen einen Zeitstempel an, um den Cache zu umgehen
            frame.src = "event.html?v=" + Date.now();
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
