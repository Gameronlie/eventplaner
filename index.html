<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projekt Portal</title>
    
    <!-- PWA & iPad App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eventplaner">
    
    <!-- Verknüpfungen für Icon und Installation -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="Gemini_Generated_Image_bu298gbu298gbu29.png">

    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --accent-blue: #58a6ff;
            --button-blue: #1f6feb;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        /* Portal-Design wie in Screenshot 2026-05-14 015931.png */
        .portal-card {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid #30363d;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            width: 85%;
            max-width: 450px;
        }

        h1 {
            color: var(--accent-blue);
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .status-text {
            color: var(--text-dim);
            margin-bottom: 35px;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* Button für schnelle Reaktion am Tablet */
        .main-button {
            background-color: var(--button-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.1s;
            touch-action: manipulation;
            box-shadow: 0 8px 20px rgba(31, 111, 235, 0.3);
        }

        .main-button:active {
            transform: scale(0.96);
            background-color: #1158c7;
        }

        .branding {
            position: absolute;
            bottom: 30px;
            font-size: 0.75rem;
            color: #30363d;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <h1>Projekt Portal</h1>
        <p class="status-text">
            Offline-Modus aktiv. Du kannst diese Seite jetzt zum Home-Bildschirm hinzufügen.
        </p>
        
        <button class="main-button" ontouchstart="" onclick="startSystem()">
            Starten
        </button>
    </div>

    <div class="branding">Secure PWA Environment | Gameronlie</div>

    <script>
        function startSystem() {
            // Bananen-Check: App-Logik hier einfügen
            alert("Bananen-Check: System bereit!");
        }

        // Service Worker Registrierung für echtes "App-Gefühl" am iPad
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('App bereit!', reg))
                .catch(err => console.log('Fehler beim Registrieren:', err));
            });
        }
    </script>
</body>
</html>
