<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eventplaner | Privat</title>
    
    <!-- PWA & iPad App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eventplaner">
    
    <!-- Verknüpfung zu Manifest und Icon im images-Ordner -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-512.png">

    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --accent-blue: #58a6ff;
            --button-blue: #1f6feb;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 85%;
            max-width: 420px;
        }

        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 35px;
            font-size: 1.1rem;
        }

        .main-button {
            background-color: var(--button-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.1s;
            touch-action: manipulation;
            box-shadow: 0 8px 20px rgba(31, 111, 235, 0.4);
        }

        .main-button:active {
            transform: scale(0.96);
        }

        #event-list {
            margin-top: 20px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            color: var(--accent-blue);
        }

        .branding {
            position: absolute;
            bottom: 30px;
            font-size: 0.75rem;
            color: #30363d;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Eventplaner</h1>
        <p class="subtitle">Private Planungstool</p>
        
        <button class="main-button" ontouchstart="" onclick="startePlanung()">
            Neues Event planen
        </button>

        <div id="event-list"></div>
    </div>

    <div class="branding">Secure PWA | Gameronlie</div>

    <script>
        function startePlanung() {
            // Eine echte Interaktion statt nur einem Alert
            let name = prompt("Wie soll das Event heißen?");
            if (name) {
                const list = document.getElementById('event-list');
                const entry = document.createElement('p');
                entry.textContent = "📅 " + name;
                list.appendChild(entry);
                
                // Kurze Bestätigung
                console.log("Event erstellt: " + name);
            }
        }

        // Service Worker Registrierung
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
