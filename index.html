<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projekt Portal</title>
    
    <!-- Apple App-Modus Aktivierung -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="Gemini_Generated_Image_bu298gbu298gbu29.png">

    <style>
        body { background: #0b0e14; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #30363d; }
        .btn { background: #1f6feb; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Projekt Portal</h1>
        <p>Status: Bereit zur Konfiguration</p>
        <button class="btn" onclick="configApp()">App jetzt konfigurieren</button>
    </div>

    <script>
        function configApp() {
            // Hier konfigurierst du die App-Funktion
            let choice = prompt("Was soll die App steuern? (1: Event, 2: Musik, 3: Auto)");
            localStorage.setItem('app_mode', choice);
            alert("System auf Modus " + choice + " eingestellt und offline gespeichert!");
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
