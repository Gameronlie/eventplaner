<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekt Portal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0e14">

    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --blue: #58a6ff;
            --btn-color: #1f6feb;
            --text: #f0f6fc;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            height: 100vh;
        }

        /* Versteckt alles, was nach Browser aussieht */
        .app-view {
            display: none; /* Wird per JS aktiviert */
            padding: 20px;
            flex-grow: 1;
        }

        .web-view {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 15px; 
            text-align: center; 
            border: 1px solid #30363d;
            width: 300px;
        }

        .btn { 
            background: var(--btn-color); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            width: 100%; 
            font-weight: bold;
            margin-top: 10px;
        }

        .portal-header {
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- ANSICHT 1: Nur im Browser sichtbar -->
    <div id="web-interface" class="web-view">
        <div class="card">
            <h1>Projekt Portal</h1>
            <p>Öffne die installierte App für den vollen Funktionsumfang.</p>
            <button class="btn" onclick="konfig()">Konfiguration</button>
        </div>
    </div>

    <!-- ANSICHT 2: Nur in der App sichtbar -->
    <div id="app-interface" class="app-view">
        <div class="portal-header">
            <h1 id="portal-title">Lädt...</h1>
        </div>
        <div id="content">
            <!-- Hier kommen deine App-Inhalte rein -->
            <p>Willkommen in deiner privaten Offline-Umgebung.</p>
            <div id="custom-area"></div>
        </div>
        <button class="btn" onclick="konfig()" style="margin-top: auto;">Einstellungen</button>
    </div>

    <script>
        // Bananen-Check: Sind wir in der App oder im Browser?
        const isApp = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        if (isApp) {
            document.getElementById('web-interface').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
            loadPortal();
        }

        function konfig() {
            let mode = prompt("Modus wählen: 1 (Event), 2 (Auto), 3 (Musik)");
            if(mode) {
                localStorage.setItem('portal_mode', mode);
                location.reload(); // Lädt die App mit neuem Modus neu
            }
        }

        function loadPortal() {
            const mode = localStorage.getItem('portal_mode') || "0";
            const title = document.getElementById('portal-title');
            const area = document.getElementById('custom-area');

            if(mode === "1") {
                title.innerText = "Event Planung";
                area.innerHTML = "<p>Bereit für neue Events.</p>";
            } else if(mode === "2") {
                title.innerText = "Autohaus Schnecke";
                area.innerHTML = "<p>Social Media & Kalkulation aktiv.</p>";
            } else if(mode === "3") {
                title.innerText = "Musik Produktion";
                area.innerHTML = "<p>Cubase & FL Studio Workflow.</p>";
            } else {
                title.innerText = "Projekt Portal";
                area.innerHTML = "<p>Bitte Modus konfigurieren.</p>";
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
