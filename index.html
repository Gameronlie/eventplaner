<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eventplaner | Privat</title>
    
    <!-- PWA Settings für iPad -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --accent-blue: #58a6ff;
            --button-blue: #1f6feb;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        /* Container für den modernen Look */
        .glass-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 80%;
            max-width: 400px;
        }

        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 32px;
            font-size: 1rem;
        }

        /* Der Haupt-Button (Optimiert für iPad-Touch) */
        .main-button {
            background-color: var(--button-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(31, 111, 235, 0.3);
            
            /* Verhindert Verzögerungen am iPad */
            touch-action: manipulation;
        }

        .main-button:active {
            transform: scale(0.97);
            background-color: #1158c7;
            box-shadow: 0 2px 6px rgba(31, 111, 235, 0.2);
        }

        .footer-info {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #30363d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Eventplaner</h1>
        <p class="subtitle">Privates Dashboard</p>
        
        <!-- Button mit direkter Touch-Reaktion -->
        <button class="main-button" ontouchstart="" onclick="startePlanung()">
            Planung starten
        </button>
    </div>

    <div class="footer-info">Secure Access | Gameronlie</div>

    <script>
        function startePlanung() {
            // Hier kommt später deine Logik rein
            alert("Bananen-Check: System bereit!");
            console.log("Event-Modus aktiviert.");
        }
    </script>
</body>
</html>
