<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Event Portal</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0b0e14; --blue: #58a6ff; }
        body { background: var(--bg); margin: 0; font-family: sans-serif; }

        /* Ladescreen */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
        }

        .loader {
            border: 4px solid #161b22;
            border-top: 4px solid var(--blue);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash">
        <div class="loader"></div>
        <p style="color: var(--blue); margin-top: 15px;">Lade Dashboard...</p>
    </div>

    <script>
        window.onload = () => {
            // Kurze Verzögerung für das "App-Gefühl"
            setTimeout(() => {
                // Leitet direkt zum Dashboard weiter
                window.location.href = "event.html";
            }, 1200);
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
