<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eventplaner</title>
    
    <!-- PWA & iPad Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Dunkelmodus mit Blau-Akzenten */
        body {
            background-color: #0d1117; 
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent; /* Entfernt graues Flackern auf iPad */
        }

        h1 {
            color: #58a6ff; 
            margin-bottom: 20px;
        }

        /* Button-Design: Dunkelblau & Sofort klickbar */
        .main-button {
            background-color: #1f6feb; 
            color: white;
            border: none;
            padding: 20px 40px; /* Etwas größer für bessere Bedienung am Tablet */
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(31, 111, 235, 0.4);
            transition: transform 0.1s;
            
            /* Verhindert Verzögerungen auf Touch-Geräten */
            touch-action: manipulation;
            display: block;
            visibility: visible;
        }

        .main-button:active {
            transform: scale(0.95);
            background-color: #1158c7;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <h1>Eventplaner</h1>
    
    <!-- Der Button mit zusätzlichem Touch-Event für schnellere Reaktion -->
    <button class="main-button" ontouchstart="" onclick="startePlanung()">Event Planen</button>

    <div class="footer">Privater Planer | Gameronlie</div>

    <script>
        function startePlanung() {
            // Bananen-Check: Hier passiert die Action
            alert("Bananen-Check: Die Planung startet jetzt!");
            console.log("Button wurde gedrückt.");
        }

        // Service Worker (Optional für Offline-Nutzung)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {
                console.log("SW nicht gefunden, läuft normal weiter.");
            });
        }
    </script>
</body>
</html>
