<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event App Login</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #0b0e14; color: #f0f6fc; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #30363d; width: 85%; }
        .btn { background: #1f6feb; color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; text-decoration: none; display: block; font-size: 1.1rem; }
        h1 { color: #58a6ff; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Event Portal</h1>
        <!-- Wenn die App installiert ist, leitet dieser Button zur App-Seite -->
        <a href="event.html" class="btn">APP STARTEN</a>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
