<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Planer</title>
    <style>
        body { background: #0b0e14; color: #f0f6fc; font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; background: #161b22; color: #58a6ff; border: 1px solid #30363d; padding: 15px; border-radius: 10px; box-sizing: border-box; }
        .save-btn { background: #1f6feb; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Event Notizen</h2>
    <textarea id="data" rows="10" placeholder="Hier planen..."></textarea>
    <button class="save-btn" onclick="save()">AUF HANDY SPEICHERN</button>
    <p id="out" style="color: #8b949e; font-size: 0.8rem;"></p>

    <script>
        // Lädt Daten vom Samsung Speicher
        document.getElementById('data').value = localStorage.getItem('ev_data') || "";

        function save() {
            const val = document.getElementById('data').value;
            localStorage.setItem('ev_data', val); // Kostet 0€ Bandbreite
            document.getElementById('out').innerText = "Gespeichert!";
        }
    </script>
</body>
</html>
