<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Event Dashboard</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --blue: #58a6ff; --text: #f0f6fc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .dash-btn { 
            background: var(--card); border: 1px solid #30363d; border-radius: 15px; 
            padding: 25px; text-align: center; color: var(--text); text-decoration: none;
            display: flex; flex-direction: column; gap: 10px; font-weight: bold;
        }
        .dash-btn:active { background: #1c2128; transform: scale(0.98); }
    </style>
</head>
<body>
    <h1 style="color: var(--blue);">Event Dashboard</h1>
<div class="grid">
    <a href="planning.html" class="dash-btn"><span>📅</span>Termine</a>
    <a href="checklist.html" class="dash-btn"><span>✅</span>Checkliste</a>
    <a href="inventory.html" class="dash-btn"><span>📦</span>Inventar</a>
    <a href="notes.html" class="dash-btn"><span>📝</span>Notizen</a>
    <a href="draw.html" class="dash-btn" style="grid-column: span 2; background: #1f6feb22;"><span>🎨</span>S-Pen Skizze</a>
</div>
</body>
</html>
