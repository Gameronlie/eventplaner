<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Event Planer</title>
    <style>
        body { background: #0b0e14; color: #58a6ff; font-family: sans-serif; padding: 20px; }
        .input-group { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; }
        textarea { width: 100%; background: #0b0e14; color: white; border: 1px solid #30363d; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .save-btn { background: #1f6feb; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; }
        #status { color: #8b949e; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>
    <a href="index.html" style="color: #8b949e; text-decoration: none;">← Zurück</a>
    <h2>Event Daten</h2>
    
    <div class="input-group">
        <p>Deine Notizen (werden lokal gespeichert):</p>
        <textarea id="eventData" rows="5" placeholder="Schreib hier etwas..."></textarea>
        <button class="save-btn" onclick="saveData()">DATEN LOKAL SPEICHERN</button>
        <div id="status"></div>
    </div>

    <script>
        // Daten beim Laden abrufen
        window.onload = () => {
            const saved = localStorage.getItem('my_event_data');
            if (saved) document.getElementById('eventData').value = saved;
        };

        // Daten lokal auf dem Gerät speichern
        function saveData() {
            const data = document.getElementById('eventData').value;
            localStorage.setItem('my_event_data', data);
            document.getElementById('status').innerText = "Gespeichert am " + new Date().toLocaleTimeString();
        }
    </script>
</body>
</html>
