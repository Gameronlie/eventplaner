<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>S-Pen Skizze</title>
    <style>
        body { background: #0b0e14; margin: 0; overflow: hidden; font-family: sans-serif; }
        canvas { background: #fff; touch-action: none; display: block; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(22, 27, 34, 0.9); padding: 15px; border-radius: 20px; border: 1px solid #30363d; }
        .btn { padding: 10px; border-radius: 10px; border: none; background: #1f6feb; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button class="btn" onclick="location.href='event.html'">Zurück</button>
        <button class="btn" style="background:#f85149" onclick="clearCanvas()">Löschen</button>
        <button class="btn" style="background:#238636" onclick="saveImage()">Speichern</button>
    </div>

    <script>
      const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 100; // Platz für Buttons lassen

let drawing = false;
let mode = 'brush'; // 'brush' oder 'eraser'

ctx.lineCap = 'round';
ctx.lineWidth = 3;

canvas.addEventListener('pointerdown', (e) => {
    drawing = true;
    ctx.beginPath();
    ctx.moveTo(e.clientX, e.clientY);
});

canvas.addEventListener('pointermove', (e) => {
    if (!drawing) return;
    ctx.strokeStyle = (mode === 'eraser') ? '#ffffff' : '#000000';
    ctx.lineWidth = (mode === 'eraser') ? 20 : 3; // Radierer ist dicker
    ctx.lineTo(e.clientX, e.clientY);
    ctx.stroke();
});

canvas.addEventListener('pointerup', () => drawing = false);

function setMode(newMode) {
    mode = newMode;
    // Visuelles Feedback welcher Button aktiv ist
    document.getElementById('btn-brush').style.opacity = (mode === 'brush') ? '1' : '0.5';
    document.getElementById('btn-eraser').style.opacity = (mode === 'eraser') ? '1' : '0.5';
}

function clearCanvas() { 
    if(confirm("Alles löschen?")) ctx.clearRect(0, 0, canvas.width, canvas.height); 
}
    </script>
</body>
</html>
