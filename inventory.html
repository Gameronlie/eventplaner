<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Inventar Buchung</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --blue: #58a6ff; --green: #238636; --red: #f85149; }
        body { background: var(--bg); color: #f0f6fc; font-family: sans-serif; padding: 20px; margin: 0; }
        .row { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #30363d; }
        
        .status-btn { 
            padding: 8px 15px; border-radius: 6px; border: none; font-weight: bold; color: white; margin-top: 10px;
        }
        .frei { background: var(--green); }
        .belegt { background: var(--red); }

        .booking-area { 
            margin-top: 10px; padding-top: 10px; border-top: 1px solid #30363d; display: none; 
        }
        
        input { 
            background: #0b0e14; border: 1px solid #30363d; color: white; 
            padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 5px;
        }
        .btn-main { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <a href="event.html" style="color: var(--blue); text-decoration: none;">← Dashboard</a>
    <h2>📦 Inventar</h2>
    
    <div id="inventory-list"></div>

    <div style="background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--blue); margin-top: 20px;">
        <h3>Neues Teil hinzufügen</h3>
        <input type="text" id="name" placeholder="Name (z.B. Mischpult)">
        <input type="number" id="amount" placeholder="Anzahl" value="1">
        <button class="btn-main" onclick="addItem()">Hinzufügen</button>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('ev_inv_v3')) || [];

        function render() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = "";

            inventory.forEach((item, index) => {
                const isBooked = item.start && item.end;
                const div = document.createElement('div');
                div.className = 'row';
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between;">
                        <strong>${item.name} (${item.amount}x)</strong>
                        <button onclick="deleteItem(${index})" style="background:none; border:none; color:var(--red);">🗑️</button>
                    </div>
                    
                    <button class="status-btn ${isBooked ? 'belegt' : 'frei'}">
                        ${isBooked ? 'GEBUCHT' : 'FREI'}
                    </button>
                    
                    <button onclick="toggleBookingField(${index})" style="background:none; border:none; color:var(--blue); font-size: 0.8rem; margin-left: 10px;">
                        ${isBooked ? 'Zeitraum ändern' : '+ Zeitraum buchen'}
                    </button>

                    <div id="book-${index}" class="booking-area">
                        <input type="date" id="s-${index}" value="${item.start || ''}">
                        <input type="date" id="e-${index}" value="${item.end || ''}">
                        <button class="btn-main" style="background:var(--green); padding: 5px;" onclick="saveBooking(${index})">Speichern</button>
                    </div>

                    ${isBooked ? `<div style="font-size: 0.8rem; color:#8b949e; margin-top:5px;">📅 ${item.start} bis ${item.end}</div>` : ''}
                `;
                list.appendChild(div);
            });
        }

        function addItem() {
            const name = document.getElementById('name').value;
            const amount = document.getElementById('amount').value;
            if(name) {
                inventory.push({ name, amount, start: null, end: null });
                save();
                document.getElementById('name').value = "";
                render();
            }
        }

        function toggleBookingField(index) {
            const el = document.getElementById(`book-${index}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function saveBooking(index) {
            const start = document.getElementById(`s-${index}`).value;
            const end = document.getElementById(`e-${index}`).value;
            if(start && end) {
                inventory[index].start = start;
                inventory[index].end = end;
                save();
                render();
            }
        }

        function deleteItem(index) {
            if(confirm("Löschen?")) {
                inventory.splice(index, 1);
                save();
                render();
            }
        }

        function save() {
            localStorage.setItem('ev_inv_v3', JSON.stringify(inventory));
        }

        render();
    </script>
</body>
</html>
