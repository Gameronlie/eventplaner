<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Inventar Smart-Check</title>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --blue: #58a6ff; 
            --green: #238636; --red: #f85149; --text: #f0f6fc; 
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; margin: 0; }
        .nav-back { color: var(--blue); text-decoration: none; margin-bottom: 20px; display: inline-block; }
        .add-container { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--blue); margin-bottom: 30px; }
        input { background: #0b0e14; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-add { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .item-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #30363d; }
        .status-indicator { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-top: 10px; }
        .frei { background: var(--green); }
        .belegt { background: var(--red); }
        .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-save-date { background: var(--green); color: white; border: none; padding: 8px; border-radius: 6px; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <a href="event.html" class="nav-back">← Dashboard</a>
    <h2>📦 Inventar (Auto-Update)</h2>

    <div class="add-container">
        <input type="text" id="itemName" placeholder="Gegenstand Name">
        <input type="number" id="itemAmount" placeholder="Anzahl" value="1">
        <button class="btn-add" onclick="addItem()">Gegenstand hinzufügen</button>
    </div>

    <div id="list"></div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('ev_inventory_vFinal')) || [];

        function checkExpiry() {
            const today = new Date().toISOString().split('T')[0]; // Format: YYYY-MM-DD
            let changed = false;

            inventory.forEach(item => {
                // Wenn ein Enddatum gesetzt ist und dieses VOR heute liegt
                if (item.end && item.end < today) {
                    item.start = null;
                    item.end = null;
                    changed = true;
                }
            });

            if (changed) {
                save(); // Speichere die bereinigte Liste
            }
        }

        function render() {
            checkExpiry(); // Prüfe vor dem Zeichnen, ob Buchungen abgelaufen sind
            
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";

            inventory.forEach((item, index) => {
                const hasBooking = item.start && item.end;
                const card = document.createElement('div');
                card.className = 'item-card';

                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between;">
                        <strong>${item.name} (${item.amount}x)</strong>
                        <button onclick="deleteItem(${index})" style="background:none; border:none; color:var(--red);">🗑️</button>
                    </div>

                    <div class="status-indicator ${hasBooking ? 'belegt' : 'frei'}">
                        ${hasBooking ? 'GEBUCHT' : 'FREI'}
                    </div>

                    <div style="margin-top: 15px; border-top: 1px solid #30363d; padding-top: 10px;">
                        <div class="date-grid">
                            <input type="date" id="start-${index}" value="${item.start || ''}">
                            <input type="date" id="end-${index}" value="${item.end || ''}">
                        </div>
                        <button class="btn-save-date" onclick="updateBooking(${index})">Zeitraum buchen</button>
                    </div>
                `;
                listDiv.appendChild(card);
            });
        }

        function addItem() {
            const name = document.getElementById('itemName').value;
            const amount = document.getElementById('itemAmount').value;
            if(name.trim() !== "") {
                inventory.push({ name: name, amount: amount, start: null, end: null });
                save();
                document.getElementById('itemName').value = "";
                render();
            }
        }

        function updateBooking(index) {
            const start = document.getElementById(`start-${index}`).value;
            const end = document.getElementById(`end-${index}`).value;
            inventory[index].start = start || null;
            inventory[index].end = end || null;
            save();
            render();
        }

        function deleteItem(index) {
            if(confirm("Löschen?")) {
                inventory.splice(index, 1);
                save();
                render();
            }
        }

        function save() {
            localStorage.setItem('ev_inventory_vFinal', JSON.stringify(inventory));
        }

        render();
    </script>
</body>
</html>
