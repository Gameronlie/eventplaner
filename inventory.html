<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Inventar Smart-Pro</title>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --blue: #58a6ff; 
            --green: #238636; --red: #f85149; --orange: #d29922; --text: #f0f6fc; 
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; margin: 0; }
        .nav-back { color: var(--blue); text-decoration: none; margin-bottom: 20px; display: block; font-weight: bold; }
        
        .add-container { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #30363d; margin-bottom: 25px; }
        input { background: #0b0e14; border: 1px solid #30363d; color: white; padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-size: 1rem; }
        .btn-add { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }

        .item-card { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 16px; border: 1px solid #30363d; }
        .status-badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; }
        
        .frei { background: var(--green); }
        .reserviert { background: var(--orange); }
        .belegt { background: var(--red); }

        .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-save-date { background: transparent; color: var(--blue); border: 1px solid var(--blue); padding: 10px; border-radius: 8px; margin-top: 12px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <a href="event.html" class="nav-back">← ZURÜCK</a>
    <h2>📦 Inventar & Status</h2>

    <div class="add-container">
        <input type="text" id="itemName" placeholder="Gegenstand Name">
        <input type="number" id="itemAmount" placeholder="Anzahl" value="1">
        <button class="btn-add" onclick="addItem()">HINZÜFÜGEN</button>
    </div>

    <div id="list"></div>

    <script>
        // Wir nutzen einen komplett neuen Key, um alte Fehler zu löschen
        const STORAGE_KEY = 'ev_inventory_PRO_V1';
        let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        function getStatus(start, end) {
            if (!start || !end) return { label: 'FREI', class: 'frei' };
            
            // Heutiges Datum auf 00:00:00 setzen für sauberen Vergleich
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const startDate = new Date(start);
            startDate.setHours(0,0,0,0);
            
            const endDate = new Date(end);
            endDate.setHours(0,0,0,0);

            if (endDate < today) return { label: 'FREI', class: 'frei' };
            if (startDate > today) return { label: 'RESERVIERT', class: 'reserviert' };
            return { label: 'BELEGT', class: 'belegt' };
        }

        function render() {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";

            inventory.forEach((item, index) => {
                const status = getStatus(item.start, item.end);
                
                // Automatisches Frei-Schalten nach Ablauf
                if (status.label === 'FREI' && item.start) {
                    item.start = null;
                    item.end = null;
                    save();
                }

                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between;">
                        <strong>${item.name} (${item.amount}x)</strong>
                        <button onclick="deleteItem(${index})" style="background:none; border:none; color:var(--red);">🗑️</button>
                    </div>
                    <div class="status-badge ${status.class}" style="margin-top: 10px;">${status.label}</div>
                    <div class="date-grid">
                        <input type="date" id="start-${index}" value="${item.start || ''}">
                        <input type="date" id="end-${index}" value="${item.end || ''}">
                    </div>
                    <button class="btn-save-date" onclick="updateBooking(${index})">ZEITRAUM SPEICHERN</button>
                `;
                listDiv.appendChild(card);
            });
        }

        function addItem() {
            const name = document.getElementById('itemName').value;
            const amount = document.getElementById('itemAmount').value;
            if(name.trim() !== "") {
                inventory.push({ name, amount, start: null, end: null });
                save();
                document.getElementById('itemName').value = "";
                render();
            }
        }

        function updateBooking(index) {
            const s = document.getElementById(`start-${index}`).value;
            const e = document.getElementById(`end-${index}`).value;
            inventory[index].start = s || null;
            inventory[index].end = e || null;
            save();
            render();
        }

        function deleteItem(index) {
            inventory.splice(index, 1);
            save();
            render();
        }

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        }

        render();
    </script>
</body>
</html>
